{% extends "base.html" %}

{% block title %}콘텐츠 관리 - VOCA 애플리케이션{% endblock %}

{% block content %}
<div class="container">
    <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white">
           <h4 class="m-0">콘텐츠 관리</h4>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card">
                        <div class="card-header bg-info text-white">
                            <h5 class="m-0">단어 가져오기</h5>
                        </div>
                        <div class="card-body">
                            <p>엑셀 파일에서 단어를 가져옵니다.</p>
                            <a href="{{ url_for('content.import_vocabulary') }}" class="btn btn-primary">단어 가져오기</a>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-4 mb-4">
                    <div class="card">
                        <div class="card-header bg-info text-white">
                            <h5 class="m-0">스토리 가져오기</h5>
                        </div>
                        <div class="card-body">
                            <p>엑셀 파일에서 스토리를 가져옵니다.</p>
                            <a href="#" class="btn btn-primary">스토리 가져오기</a>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-4 mb-4">
                    <div class="card">
                        <div class="card-header bg-info text-white">
                            <h5 class="m-0">문장 가져오기</h5>
                        </div>
                        <div class="card-body">
                            <p>엑셀 파일에서 문장을 가져옵니다.</p>
                            <a href="#" class="btn btn-primary">문장 가져오기</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
